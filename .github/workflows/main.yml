name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
    
    - name: Install dependencies
      run: |
        cd SDApp_Flutter
        flutter pub get
    
    - name: Build iOS
      run: |
        cd SDApp_Flutter
        flutter build ios --release --no-codesign
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: SDApp_Flutter/build/ios/ipa/Runner.ipa
