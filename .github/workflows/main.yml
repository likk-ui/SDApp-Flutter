name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
    
    - name: Initialize Flutter project
      run: |
        flutter create --platforms=ios --org=com.grating sd_app
        cd sd_app
        cp -r ../lib ./lib/
        cp ../pubspec.yaml ./
        cp -r ../ios ./
        cp -r ../assets ./
        cp ../README.md ./
    
    - name: Install dependencies
      run: |
        cd sd_app
        flutter pub get
        cd ios && pod install && cd ..
    
    - name: Build iOS
      run: |
        cd sd_app
        flutter build ios --release --no-codesign
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: sd_app/build/ios/ipa/Runner.ipa
